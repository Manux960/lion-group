<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lion Group — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

  <div class="login-bg">
    <img src="../assets/images/hero-bg.jpg" alt="" style="object-position: center 78%;" />
    <div class="login-overlay"></div>
  </div>

  <div class="login-box">
    <div class="login-logo">
      <img src="../assets/logo/logo.png" alt="Lion Group" />
    </div>
    <p class="login-subtitle">Pannello di Controllo</p>

    <form class="login-form" id="loginForm">
      <div class="login-field">
        <label>Password</label>
        <div class="login-input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 11V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V11" stroke="currentColor" stroke-width="1.5"/></svg>
          <input type="password" id="passwordInput" placeholder="Inserisci la password" autocomplete="current-password" />
        </div>
      </div>
      <div class="login-error" id="loginError">Password non corretta. Riprova.</div>
      <button type="submit" class="login-btn">
        <span>Accedi</span>
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12H19M13 6L19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>

    <a href="../index.html" class="login-back">
      <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 6L5 12L11 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Torna al sito
    </a>

    <p class="login-hint">
      Password dimenticata? Modificala in <code>admin/index.html</code> alla riga con <code>ADMIN_PASSWORD</code>.
    </p>
  </div>

  <script>
    // Admin password — cambia qui quando vuoi aggiornarla
    const ADMIN_PASSWORD = 'lion2026';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('passwordInput').value;
      const error = document.getElementById('loginError');

      if (input === ADMIN_PASSWORD) {
        sessionStorage.setItem('lg_admin_auth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        error.classList.add('visible');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
        setTimeout(() => error.classList.remove('visible'), 3000);
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('lg_admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
